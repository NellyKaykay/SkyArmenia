		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" style="background:#fff;">
		<div id="__sveltekit-loader__">
			<div class="sk-spinner"></div>
			<style>
				#__sveltekit-loader__ {
					position: fixed;
					z-index: 9999;
					inset: 0;
					display: flex;
					align-items: center;
					justify-content: center;
					background: #fff;
					transition: opacity 0.3s ease;
				}
				.sk-spinner {
					width: 28px;
					height: 28px;
					border: 3px solid rgba(56, 182, 255, 0.2);
					border-top-color: #38b6ff;
					border-radius: 50%;
					animation: sk-spin 0.7s linear infinite;
				}
				@keyframes sk-spin {
					to { transform: rotate(360deg); }
				}
			</style>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			function removeLoader() {
				var l = document.getElementById('__sveltekit-loader__');
				if (l) {
					l.style.opacity = '0';
					setTimeout(function() { l.remove(); }, 300);
				}
			}
			// Remove loader once the page has fully loaded
			if (document.readyState === 'complete') {
				removeLoader();
			} else {
				window.addEventListener('load', removeLoader);
			}
		</script>
	</body>
</html>
